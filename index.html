<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Shift Tip Entry</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#9E3A2E">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Matsuri Tips">
<style>
  :root {
    --brand: #9E3A2E; --brand-soft: #A84337;
    --gold: #D6A04C; --gold-light: #F4D389;
    --ink: #2A2320; --muted: #8A7D6F; --line: #E7DECF; --bg: #F5EFE1;
    --indigo: var(--brand); --indigo-soft: var(--brand-soft); /* lantern theme: legacy aliases -> red */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 { font-size: 1.25rem; margin: 0 0 1rem; }
  .page-head {
    display: flex; align-items: center; gap: .6rem;
    margin: -1rem -1rem 1.25rem; padding: .8rem 1rem .9rem;
    background: linear-gradient(160deg, var(--indigo-soft), var(--indigo));
    color: #fff; border-radius: 0 0 16px 16px;
  }
  .page-head h1 { margin: 0; font-size: 1.15rem; flex: 1; color: #fff; }
  .brand-logo { width: 30px; height: 30px; border-radius: 7px; flex: none; }
  .view-today { color: #fff; background: rgba(255,255,255,0.14); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; font-size: .8rem; white-space: nowrap; }
  label { display: block; font-weight: 600; margin: 1rem 0 .25rem; }
  input[type=text], input[type=number], input[type=time], select {
    width: 100%;
    padding: .75rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
  }
  input:focus, select:focus { outline: 2px solid var(--gold); outline-offset: -1px; }
  input[type=checkbox] { accent-color: var(--indigo); }
  input.error { border-color: #b00; }
  .field-error { color: #b00; font-size: .85rem; margin-top: .25rem; min-height: 1em; }
  .toggle-row { display: flex; align-items: center; gap: .75rem; margin: 1rem 0 .25rem; }
  .toggle-row span { font-weight: 600; }
  .switch { position: relative; width: 3rem; height: 1.75rem; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #ccc; border-radius: 1rem; transition: .2s; cursor: pointer; }
  .slider::before {
    content: ""; position: absolute; height: 1.5rem; width: 1.5rem; left: .125rem; bottom: .125rem;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .slider { background: var(--indigo); }
  .switch input:checked + .slider::before { transform: translateX(1.25rem); }
  .pct-buttons { display: flex; gap: .5rem; margin-top: .5rem; }
  .pct-buttons button {
    flex: 1; padding: .75rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px;
    background: #fff; cursor: pointer;
  }
  .pct-buttons button.selected { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .pct-buttons button:disabled { opacity: .45; cursor: not-allowed; }
  .person { border: 1px solid var(--line); border-radius: 10px; padding: .85rem; margin: .6rem 0; background: #fff; }
  .person-head { display: flex; justify-content: space-between; align-items: center; }
  .person-title { font-weight: 700; }
  .remove-person { border: 0; background: transparent; color: #b00; font-size: .85rem; cursor: pointer; padding: .25rem; }
  .person label { margin: .6rem 0 .25rem; font-size: .9rem; }
  .times { display: flex; gap: .5rem; }
  .time-field { flex: 1; min-width: 0; }
  .add-btn {
    width: 100%; padding: .7rem; font-size: 1rem; border: 1px dashed #999;
    background: #fff; border-radius: 8px; cursor: pointer; color: #333; margin-top: .25rem;
  }
  .add-btn:disabled { opacity: .5; cursor: default; }
  .preview {
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    padding: 1rem; margin: 1.5rem 0;
  }
  .preview-row { display: flex; justify-content: space-between; padding: .25rem 0; gap: .5rem; }
  .preview-row.total { border-top: 1px solid var(--line); margin-top: .5rem; padding-top: .5rem; font-weight: 600; }
  .submit-btn {
    width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(180deg, var(--brand-soft), var(--brand)); color: #fff;
    border: 0; border-radius: 10px; cursor: pointer;
  }
  .submit-btn:disabled { background: #d3c8b8; color: #9a8e7e; cursor: not-allowed; }
  .banner { padding: .75rem; border-radius: 6px; margin: 1rem 0; }
  .banner.error { background: #fee; color: #900; border: 1px solid #f99; }
  .banner.success { background: #efe; color: #060; border: 1px solid #9d9; }
  .combo { position: relative; }
  .combo-list {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
    background: #fff; border: 1px solid #bbb; border-top: 0;
    border-radius: 0 0 6px 6px; max-height: 240px; overflow-y: auto;
    box-shadow: 0 8px 22px rgba(0,0,0,0.16);
  }
  .combo-list .opt { padding: .75rem; cursor: pointer; border-top: 1px solid #eee; }
  .combo-list .opt:first-child { border-top: 0; }
  .combo-list .opt:active, .combo-list .opt.active { background: #eef0f5; }
  .hidden { display: none !important; }
  .switch-user { display: inline-block; background: none; border: 0; color: var(--indigo); font-size: .82rem; padding: .15rem 0; margin-top: .1rem; cursor: pointer; text-decoration: underline; }
  .lang-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.16); border-radius: 8px; padding: 2px; flex: none; }
  .lang-toggle button { border: 0; background: transparent; color: #fff; font-size: .72rem; padding: .3rem .45rem; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .lang-toggle button.active { background: #fff; color: var(--brand); font-weight: 700; }
</style>
</head>
<body>

<header class="page-head">
  <img src="icons/icon.svg" alt="" class="brand-logo">
  <h1 data-i18n="entry_title">Shift Tip Entry</h1>
  <div class="lang-toggle" id="lang-toggle">
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="ko">한국어</button>
  </div>
  <a class="view-today" href="today.html"><span data-i18n="today_link">Today</span> &rarr;</a>
</header>

<div id="banner" class="banner hidden"></div>

<form id="shift-form" novalidate>
  <label for="entered-by" data-i18n="your_name">Your name</label>
  <div class="combo">
    <input type="text" id="entered-by" autocomplete="off" maxlength="60">
    <div class="combo-list hidden"></div>
  </div>
  <div class="field-error" id="err-entered-by"></div>
  <button type="button" id="switch-user" class="switch-user hidden"></button>

  <label data-i18n="shift_label">Shift</label>
  <div class="pct-buttons" id="shift-toggle">
    <button type="button" data-shift="lunch" data-i18n="lunch">Lunch</button>
    <button type="button" data-shift="dinner" data-i18n="dinner">Dinner</button>
  </div>
  <div class="field-error" id="shift-note" style="margin-top:.25rem"></div>

  <label for="total-tips" data-i18n="total_tips_label">Total tip amount ($)</label>
  <input type="number" id="total-tips" inputmode="decimal" step="0.01" min="1" max="100000">
  <div class="field-error" id="err-total-tips"></div>

  <label data-i18n="servers_label">Servers on shift</label>
  <div id="people-container"></div>
  <button type="button" class="add-btn" id="add-person" data-i18n="add_server">+ Add server</button>

  <div id="chef-section" class="hidden">
    <label data-i18n="chefs_label">Chefs on shift</label>
    <div id="chef-list"></div>
  </div>

  <div class="preview hidden" id="preview" aria-live="polite"></div>

  <button type="submit" class="submit-btn" id="submit-btn" data-i18n="submit">Submit shift</button>
</form>

<script src="i18n.js"></script>
<script src="calc.js"></script>
<script>
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbyvxUBapgpbZpf-ndoexuH2ZjWIwO5bIzH26F-OeWmEcQY4QqbeFXs2lvRTarhlaFtHtQ/exec";

const totalTipsEl = document.getElementById("total-tips");
const enteredByEl = document.getElementById("entered-by");
const peopleContainer = document.getElementById("people-container");
const addPersonBtn = document.getElementById("add-person");
const previewEl = document.getElementById("preview");

function fmt(n) { return "$" + (n || 0).toFixed(2); }
function fmtHours(h) { const mins = Math.round((h || 0) * 60); return Math.floor(mins / 60) + "h " + (mins % 60) + "m"; }

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

// ---- shift type + slots ----
// Declared up here (before the bottom init calls) so createPersonRow ->
// populateSlotSelect can read currentShift without a temporal-dead-zone error.
let currentShift = (new Date().getHours() * 60 + new Date().getMinutes()) < (18 * 60 + 30) ? "lunch" : "dinner";
let chefRoster = []; // [{name}] from the staff roster (role=Chef)
let todayShifts = { lunch: false, dinner: false }; // which shifts are already entered today
let showSplit = true; // global config: whether to reveal the per-person split to servers

function populateSlotSelect(sel, selectedId) {
  const slots = SHIFT_SLOTS[currentShift] || [];
  sel.innerHTML = `<option value="">${escapeHtml(t("pick_time"))}</option>` +
    slots.map(s => `<option value="${s.id}"${s.id === selectedId ? " selected" : ""}>${escapeHtml(localizeSlotLabel(s.label))}</option>`).join("");
}

const shiftToggle = document.getElementById("shift-toggle");
function renderShiftToggle() {
  shiftToggle.querySelectorAll("button").forEach(b => b.classList.toggle("selected", b.dataset.shift === currentShift));
}
shiftToggle.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-shift]");
  if (!btn || btn.disabled) return;
  currentShift = btn.dataset.shift;
  renderShiftToggle();
  peopleContainer.querySelectorAll(".p-slot").forEach(sel => populateSlotSelect(sel, sel.value && getSlot(currentShift, sel.value) ? sel.value : ""));
  updatePreview();
});

// Disable the shift type(s) already entered today; default to the open one.
// Server enforces this too; this is just UX. Fails open on network error.
function applyShiftAvailability() {
  const note = document.getElementById("shift-note");
  const lunchBtn = shiftToggle.querySelector('button[data-shift="lunch"]');
  const dinnerBtn = shiftToggle.querySelector('button[data-shift="dinner"]');
  lunchBtn.disabled = todayShifts.lunch;
  dinnerBtn.disabled = todayShifts.dinner;
  if (todayShifts[currentShift]) {
    const other = currentShift === "lunch" ? "dinner" : "lunch";
    if (!todayShifts[other]) {
      currentShift = other;
      renderShiftToggle();
      peopleContainer.querySelectorAll(".p-slot").forEach(sel => populateSlotSelect(sel, getSlot(currentShift, sel.value) ? sel.value : ""));
    }
  }
  const bothTaken = todayShifts.lunch && todayShifts.dinner;
  if (bothTaken) {
    note.textContent = t("both_entered");
  } else if (todayShifts.lunch || todayShifts.dinner) {
    note.textContent = t("one_entered", { shift: t(todayShifts.lunch ? "lunch" : "dinner") });
  } else {
    note.textContent = "";
  }
  submitBtn.disabled = bothTaken;
}

function loadTodayShifts() {
  fetch(ENDPOINT_URL, {
    method: "POST", mode: "cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "fetchToday" }),
  })
    .then(r => r.json())
    .then(data => {
      if (!data || !data.ok || !Array.isArray(data.rows)) return;
      if (data.config && typeof data.config.showSplit === "boolean") {
        showSplit = data.config.showSplit;
        updatePreview();
      }
      const s = { lunch: false, dinner: false };
      data.rows.forEach(r => {
        const sh = String(r.shift || "").toLowerCase();
        if (sh === "lunch") s.lunch = true; else if (sh === "dinner") s.dinner = true;
      });
      todayShifts = s;
      applyShiftAvailability();
    })
    .catch(() => {}); // fail open; server is the backstop
}

function renderChefList() {
  const sec = document.getElementById("chef-section");
  const list = document.getElementById("chef-list");
  if (!chefRoster.length) { sec.classList.add("hidden"); list.innerHTML = ""; return; }
  sec.classList.remove("hidden");
  list.innerHTML = chefRoster.map((c) =>
    `<label class="toggle-row"><input type="checkbox" class="chef-cb" value="${escapeHtml(c.name)}"><span>${escapeHtml(c.name)}</span></label>`
  ).join("");
  list.querySelectorAll(".chef-cb").forEach(cb => cb.addEventListener("change", updatePreview));
}

function readChefs() {
  return Array.from(document.querySelectorAll(".chef-cb")).filter(cb => cb.checked).map(cb => ({ name: cb.value }));
}

// ---- staff dropdown (custom combobox) ----
const STAFF_KEY = "matsuri_staff_v2";
const ME_KEY = "matsuri_me";
function getMe() { try { return localStorage.getItem(ME_KEY) || ""; } catch (e) { return ""; } }
function setMe(name) { try { name ? localStorage.setItem(ME_KEY, name) : localStorage.removeItem(ME_KEY); } catch (e) {} }
let staffNames = [];

function setStaff(list) {
  const arr = Array.isArray(list) ? list : [];
  staffNames = arr.filter(s => (s.role || "Server") !== "Chef").map(s => s.name);
  chefRoster = arr.filter(s => (s.role || "Server") === "Chef").map(s => ({ name: s.name }));
  renderChefList();
  const a = document.activeElement;
  if (a && a.parentElement && a.parentElement.classList.contains("combo")) renderComboList(a);
}

function renderComboList(input) {
  const panel = input.parentElement.querySelector(".combo-list");
  if (!panel) return;
  const q = input.value.trim().toLowerCase();
  const matches = staffNames.filter(n => n.toLowerCase().indexOf(q) !== -1);
  if (!matches.length) { panel.innerHTML = ""; panel.classList.add("hidden"); return; }
  panel.innerHTML = matches.map(n => `<div class="opt" role="option">${escapeHtml(n)}</div>`).join("");
  panel.classList.remove("hidden");
}

function attachCombo(input) {
  const panel = input.parentElement.querySelector(".combo-list");
  if (!panel) return;
  input.addEventListener("focus", () => renderComboList(input));
  input.addEventListener("input", () => renderComboList(input));
  input.addEventListener("blur", () => setTimeout(() => panel.classList.add("hidden"), 150));
  panel.addEventListener("pointerdown", (e) => {
    const opt = e.target.closest(".opt");
    if (!opt) return;
    e.preventDefault(); // keep focus so the tap doesn't blur before we read it
    input.value = opt.textContent;
    panel.classList.add("hidden");
    updatePreview();
  });
}

function loadStaff() {
  try { localStorage.removeItem("matsuri_staff"); } catch (e) {} // drop legacy string-array cache
  try {
    const cached = JSON.parse(localStorage.getItem(STAFF_KEY) || "[]");
    if (Array.isArray(cached) && cached.length && typeof cached[0] === "object") setStaff(cached);
  } catch (e) {}
  fetch(ENDPOINT_URL, {
    method: "POST",
    mode: "cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "fetchStaff" }),
  })
    .then(r => r.json())
    .then(data => {
      if (data && data.ok && Array.isArray(data.staff)) {
        setStaff(data.staff);
        localStorage.setItem(STAFF_KEY, JSON.stringify(data.staff));
      }
    })
    .catch(() => {});
}

// ---- people rows ----
function createPersonRow() {
  const row = document.createElement("div");
  row.className = "person";
  row.innerHTML =
    '<div class="person-head">' +
      '<span class="person-title">Person</span>' +
      '<button type="button" class="remove-person hidden" data-i18n="remove">Remove</button>' +
    '</div>' +
    '<div class="combo">' +
      '<input type="text" class="p-name" autocomplete="off" maxlength="40" data-i18n-ph="ph_name" placeholder="Name">' +
      '<div class="combo-list hidden"></div>' +
    '</div>' +
    '<label data-i18n="time_slot">Time slot</label>' +
    '<select class="p-slot"></select>' +
    '<div class="toggle-row">' +
      '<label class="switch"><input type="checkbox" class="p-trainee"><span class="slider"></span></label>' +
      '<span data-i18n="trainee">Trainee</span>' +
    '</div>' +
    '<div class="pct-buttons hidden">' +
      '<button type="button" data-pct="25">25%</button>' +
      '<button type="button" data-pct="50" class="selected">50%</button>' +
      '<button type="button" data-pct="75">75%</button>' +
    '</div>' +
    '<div class="field-error"></div>';
  applyStaticI18n(row);

  const nameInput = row.querySelector(".p-name");
  nameInput.addEventListener("input", updatePreview);
  attachCombo(nameInput);
  const slotSel = row.querySelector(".p-slot");
  populateSlotSelect(slotSel);
  slotSel.addEventListener("change", updatePreview);

  const traineeToggle = row.querySelector(".p-trainee");
  const pctButtons = row.querySelector(".pct-buttons");
  traineeToggle.addEventListener("change", () => {
    pctButtons.classList.toggle("hidden", !traineeToggle.checked);
    if (traineeToggle.checked) {
      pctButtons.querySelectorAll("button").forEach(b => b.classList.toggle("selected", b.dataset.pct === "50"));
    }
    updatePreview();
  });
  pctButtons.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-pct]");
    if (!btn) return;
    pctButtons.querySelectorAll("button").forEach(b => b.classList.toggle("selected", b === btn));
    updatePreview();
  });
  row.querySelector(".remove-person").addEventListener("click", () => {
    row.remove();
    relabelPeople();
    updateAddButton();
    updatePreview();
  });
  return row;
}

function addPerson() {
  if (peopleContainer.querySelectorAll(".person").length >= 12) return;
  peopleContainer.appendChild(createPersonRow());
  relabelPeople();
  updateAddButton();
  updatePreview();
}

function relabelPeople() {
  const rows = peopleContainer.querySelectorAll(".person");
  const showRemove = rows.length > 1;
  rows.forEach((row, i) => {
    row.querySelector(".person-title").textContent = t("server_n", { n: i + 1 });
    row.querySelector(".remove-person").classList.toggle("hidden", !showRemove);
  });
}

function updateAddButton() {
  addPersonBtn.disabled = peopleContainer.querySelectorAll(".person").length >= 12;
}

function readServers() {
  return Array.from(peopleContainer.querySelectorAll(".person")).map(row => {
    const trainee = row.querySelector(".p-trainee").checked;
    const sel = row.querySelector(".pct-buttons button.selected");
    return {
      name: row.querySelector(".p-name").value.trim(),
      slot: row.querySelector(".p-slot").value,
      trainee: trainee,
      pct: trainee ? (sel ? parseInt(sel.dataset.pct, 10) : 50) : null,
    };
  });
}

function updatePreview() {
  const totalTips = parseFloat(totalTipsEl.value);
  const servers = readServers();
  const chefs = readChefs();
  const ready = isFinite(totalTips) && totalTips >= 1 && servers.length >= 1 &&
    servers.every(s => s.name && getSlot(currentShift, s.slot));
  if (!ready) {
    previewEl.innerHTML = "";
    previewEl.classList.add("hidden");
    return;
  }
  previewEl.classList.remove("hidden");
  if (!showSplit) {
    previewEl.innerHTML = `<div class="preview-row"><span>${escapeHtml(t("split_hidden_ready"))}</span></div>`;
    return;
  }
  const splits = splitShift({ shiftType: currentShift, totalTips, servers, chefs });
  const rows = [`<div class="preview-row"><span>${escapeHtml(t("kitchen"))}</span><span>${fmt(splits.kitchen)}</span></div>`];
  splits.chefs.forEach(c => rows.push(`<div class="preview-row"><span>${escapeHtml(c.name)} ${escapeHtml(t("chef_suffix"))}</span><span>${fmt(c.amount)}</span></div>`));
  splits.servers.forEach(p => {
    const label = (p.name || t("server_word")) + (p.trainee ? " " + t("trainee_suffix", { pct: p.pct }) : "");
    rows.push(`<div class="preview-row"><span>${escapeHtml(label)} · ${fmtHours(p.hours)}</span><span>${fmt(p.amount)}</span></div>`);
  });
  const total = splits.kitchen + splits.chefs.reduce((s, c) => s + c.amount, 0) + splits.servers.reduce((s, p) => s + p.amount, 0);
  rows.push(`<div class="preview-row total"><span>${escapeHtml(t("total"))}</span><span>${fmt(total)}</span></div>`);
  previewEl.innerHTML = rows.join("");
}

const switchUserBtn = document.getElementById("switch-user");

function renderSwitchUser() {
  const me = getMe();
  switchUserBtn.textContent = me ? t("not_me", { name: me }) : "";
  switchUserBtn.classList.toggle("hidden", !me);
}

function applyRememberedName() {
  const me = getMe();
  if (me) {
    enteredByEl.value = me;
    const firstName = peopleContainer.querySelector(".person .p-name");
    if (firstName && !firstName.value) firstName.value = me;
  }
  renderSwitchUser();
}

switchUserBtn.addEventListener("click", () => {
  const oldMe = getMe();
  setMe("");
  if (enteredByEl.value.trim() === oldMe) enteredByEl.value = "";
  const firstName = peopleContainer.querySelector(".person .p-name");
  if (firstName && firstName.value.trim() === oldMe) firstName.value = "";
  renderSwitchUser();
  updatePreview();
  enteredByEl.focus();
});

// ---- language ----
const langToggle = document.getElementById("lang-toggle");
function updateLangButtons() {
  const lang = getLang();
  langToggle.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}
// The entry form has no single render(), so each dynamic surface is re-translated
// by hand here. Add any new dynamic text surface to this list.
function applyLang() {
  applyStaticI18n();
  relabelPeople();
  peopleContainer.querySelectorAll(".p-slot").forEach(sel => populateSlotSelect(sel, getSlot(currentShift, sel.value) ? sel.value : ""));
  applyShiftAvailability();
  renderSwitchUser();
  updatePreview();
  updateLangButtons();
}
langToggle.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-lang]");
  if (!btn) return;
  setLang(btn.dataset.lang);
  applyLang();
});

totalTipsEl.addEventListener("input", updatePreview);
addPersonBtn.addEventListener("click", addPerson);
attachCombo(enteredByEl);
applyStaticI18n();
updateLangButtons();
renderShiftToggle();
addPerson();
applyRememberedName();
updatePreview();
loadStaff();
loadTodayShifts();

// ---- submit ----
let submissionId = newSubmissionId();
function newSubmissionId() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "sid-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
}

const form = document.getElementById("shift-form");
const submitBtn = document.getElementById("submit-btn");
const bannerEl = document.getElementById("banner");

function showBanner(kind, html) {
  bannerEl.className = `banner ${kind}`;
  bannerEl.innerHTML = html;
  bannerEl.classList.remove("hidden");
}
function hideBanner() {
  bannerEl.classList.add("hidden");
  bannerEl.innerHTML = "";
}

function setFieldError(id, msg) {
  const errEl = document.getElementById(id);
  if (errEl) errEl.textContent = msg || "";
  const inputId = id.replace(/^err-/, "");
  const inputEl = document.getElementById(inputId);
  if (inputEl) inputEl.classList.toggle("error", !!msg);
}

function clearAllErrors() {
  ["err-entered-by", "err-total-tips"].forEach(id => setFieldError(id, ""));
  peopleContainer.querySelectorAll(".field-error").forEach(e => e.textContent = "");
}

function validateClient() {
  clearAllErrors();
  let ok = true;

  if (!enteredByEl.value.trim()) {
    setFieldError("err-entered-by", t("required"));
    ok = false;
  }
  const tips = parseFloat(totalTipsEl.value);
  if (!isFinite(tips) || tips < 1 || tips > 100000) {
    setFieldError("err-total-tips", t("err_amount_range"));
    ok = false;
  }
  Array.from(peopleContainer.querySelectorAll(".person")).forEach(row => {
    const err = row.querySelector(".field-error");
    const name = row.querySelector(".p-name").value.trim();
    const slot = row.querySelector(".p-slot").value;
    let msg = "";
    if (!name) msg = t("name_required");
    else if (!getSlot(currentShift, slot)) msg = t("pick_time_slot");
    if (err) err.textContent = msg;
    if (msg) ok = false;
  });
  const dupName = firstDuplicateName(readServers().map(s => s.name));
  if (dupName) {
    const dk = dupName.toLowerCase();
    Array.from(peopleContainer.querySelectorAll(".person")).forEach(row => {
      if (row.querySelector(".p-name").value.trim().toLowerCase() === dk) {
        row.querySelector(".field-error").textContent = t("dup_server");
      }
    });
    ok = false;
  }
  return ok;
}

function buildPayload() {
  return {
    submissionId,
    enteredBy: enteredByEl.value.trim(),
    shiftType: currentShift,
    totalTips: parseFloat(totalTipsEl.value),
    servers: readServers(),
    chefs: readChefs(),
  };
}

async function submitShift() {
  hideBanner();
  if (!validateClient()) return;

  submitBtn.disabled = true;
  submitBtn.textContent = t("submitting");

  let response;
  try {
    const res = await fetch(ENDPOINT_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(buildPayload()),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    response = await res.json();
  } catch (e) {
    submitBtn.disabled = false;
    submitBtn.textContent = t("submit");
    showBanner("error", escapeHtml(t("err_save_conn")));
    return;
  }

  submitBtn.disabled = false;
  submitBtn.textContent = t("submit");

  if (response.ok) {
    setMe(enteredByEl.value.trim());
    renderConfirmation(response);
  } else if (response.retryable) {
    showBanner("error", escapeHtml(t("err_save_retry")));
  } else {
    showBanner("error", escapeHtml(t("err_entry_prefix")) + escapeHtml(response.error || t("unknown_error")));
  }
}

function renderConfirmation(response) {
  const splits = response.splits;
  const reveal = (typeof response.showSplit === "boolean") ? response.showSplit : showSplit;
  const rows = [`<strong>${escapeHtml(response.dedup ? t("prev_recorded") : t("shift_recorded"))}</strong>`];
  if (reveal && splits) {
    rows.push(`<div class="preview-row"><span>${escapeHtml(t("kitchen"))}</span><span>${fmt(splits.kitchen)}</span></div>`);
    (splits.chefs || []).forEach(c => rows.push(`<div class="preview-row"><span>${escapeHtml(c.name)} ${escapeHtml(t("chef_suffix"))}</span><span>${fmt(c.amount)}</span></div>`));
    (splits.servers || []).forEach(p => {
      const label = (p.name || t("server_word")) + (p.trainee ? " " + t("trainee_suffix", { pct: p.pct }) : "");
      rows.push(`<div class="preview-row"><span>${escapeHtml(label)} · ${fmtHours(p.hours)}</span><span>${fmt(p.amount)}</span></div>`);
    });
  }
  rows.push(`<button type="button" id="reset-btn" class="submit-btn" style="margin-top:1rem">${escapeHtml(t("record_another"))}</button>`);

  form.classList.add("hidden");
  showBanner("success", rows.join(""));
  document.getElementById("reset-btn").addEventListener("click", resetForm);
}

function resetForm() {
  hideBanner();
  form.classList.remove("hidden");
  enteredByEl.value = "";
  totalTipsEl.value = "";
  peopleContainer.innerHTML = "";
  addPerson();
  applyRememberedName();
  renderChefList();
  clearAllErrors();
  submissionId = newSubmissionId();
  updatePreview();
  loadTodayShifts(); // the shift just entered is now taken
  if (getMe()) totalTipsEl.focus(); else enteredByEl.focus();
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  submitShift();
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Matsuri Tips Admin</title>
<link rel="manifest" href="admin.webmanifest">
<meta name="theme-color" content="#9E3A2E">
<link rel="icon" href="icons/icon-admin.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-admin.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tips Admin">
<style>
  :root {
    --brand: #9E3A2E;
    --brand-soft: #A84337;
    --gold: #D6A04C;
    --gold-light: #F4D389;
    --ink: #2A2320;
    --muted: #8A7D6F;
    --line: #E7DECF;
    --bg: #F5EFE1;
    --card: #ffffff;
    --indigo: var(--brand); --indigo-soft: var(--brand-soft); /* lantern theme: legacy aliases -> red */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 1rem 3rem; }

  /* PIN gate */
  #gate {
    position: fixed; inset: 0; background: linear-gradient(160deg, var(--brand-soft), #7A2417);
    display: flex; align-items: center; justify-content: center; padding: 1.5rem; z-index: 20;
  }
  #gate.hidden { display: none; }
  .gate-card {
    width: 100%; max-width: 340px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(244,211,137,0.25); border-radius: 16px; padding: 1.75rem 1.5rem;
    text-align: center; color: #fff; backdrop-filter: blur(4px);
  }
  .gate-card img {
    width: 76px; height: 76px; display: block; margin: 0 auto .75rem;
    border-radius: 18px; object-fit: cover; background: var(--bg);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  }
  .gate-card h1 { font-size: 1.15rem; margin: 0 0 .25rem; font-weight: 600; letter-spacing: .01em; }
  .gate-card p { margin: 0 0 1.25rem; color: #F3E1CF; font-size: .9rem; }
  .gate-card input {
    width: 100%; padding: .85rem; font-size: 1.4rem; text-align: center; letter-spacing: .4em;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 10px; background: rgba(0,0,0,0.25);
    color: #fff; margin-bottom: .75rem;
  }
  .gate-card input:focus { outline: 2px solid var(--gold); }
  .gate-card button {
    width: 100%; padding: .85rem; font-size: 1.05rem; font-weight: 600; cursor: pointer;
    border: 0; border-radius: 10px; background: #fff;
    color: var(--brand);
  }
  .gate-card button:disabled { opacity: .6; cursor: default; }
  .gate-err { color: #ffb4b4; font-size: .88rem; min-height: 1.2em; margin-top: .6rem; }
  .gate-checking { color: #F3E1CF; font-size: .9rem; margin: 0; padding: .85rem 0; }

  /* Header */
  header.bar {
    background: linear-gradient(160deg, var(--indigo-soft), var(--indigo));
    color: #fff; padding: 1rem 0 1.1rem;
    position: sticky; top: 0; z-index: 10;
    border-radius: 0 0 16px 16px;
  }
  header.bar .wrap { display: flex; align-items: center; gap: .6rem; padding-bottom: 0; }
  header.bar img {
    width: 32px; height: 32px; border-radius: 8px; flex: none;
    object-fit: cover; background: var(--bg);
    box-shadow: 0 1px 5px rgba(42,35,32,0.22);
  }
  header.bar h1 { font-size: 1.1rem; margin: 0; font-weight: 600; flex: 1; }
  .iconbtn {
    background: rgba(255,255,255,0.12); border: 0; color: #fff; border-radius: 8px;
    padding: .45rem .7rem; font-size: .82rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .iconbtn:active { background: rgba(255,255,255,0.22); }

  /* Period selector */
  .periods { display: flex; flex-wrap: wrap; gap: .4rem; margin: 1rem 0 .25rem; }
  .periods button {
    flex: 1 1 auto; min-width: 4.2rem; padding: .65rem .4rem; font-size: .9rem; cursor: pointer;
    border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--ink);
  }
  .periods button.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .custom-range { display: none; margin-top: .5rem; }
  .custom-range.show { display: flex; flex-direction: column; gap: .5rem; }
  .day-presets { display: flex; flex-wrap: wrap; gap: .4rem; }
  .custom-range .preset { padding: .5rem .8rem; border: 1px solid var(--indigo); border-radius: 999px; background: #fff; color: var(--indigo); font-size: .85rem; cursor: pointer; }
  .custom-range .preset.active { background: var(--indigo); color: #fff; }
  .date-row { display: flex; gap: .5rem; align-items: center; }
  .custom-range input { flex: 1; padding: .5rem; border: 1px solid var(--line); border-radius: 8px; font-size: .9rem; min-width: 0; }
  .range-label { color: var(--muted); font-size: .82rem; margin: .5rem 0 0; }

  /* Tabs */
  .tabs {
    display: flex; gap: .25rem; margin: 1rem 0; background: #e9ecf3; border-radius: 10px; padding: .25rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button {
    flex: 0 0 auto; padding: .6rem .85rem; font-size: .88rem; cursor: pointer; border: 0; border-radius: 8px;
    background: transparent; color: var(--muted); font-weight: 600; white-space: nowrap;
  }
  .tabs button.active { background: #fff; color: var(--indigo); box-shadow: 0 1px 3px rgba(20,34,63,0.12); }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: .85rem .9rem;
  }
  .card .k { font-size: .76rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .card .v { font-size: 1.25rem; font-weight: 700; margin-top: .15rem; }
  .card.hero { grid-column: 1 / -1; background: linear-gradient(160deg, var(--indigo-soft), var(--indigo)); border: 0; color: #fff; }
  .card.hero .k { color: #F3E1CF; }
  .card.hero .v { font-size: 1.9rem; color: #fff; }

  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 1rem; margin-top: .9rem;
  }
  .panel h2 { font-size: .95rem; margin: 0 0 .75rem; color: var(--ink); }

  /* Bar chart */
  .chart { width: 100%; height: auto; display: block; }
  .chart .bar { fill: var(--brand); }
  .chart .bar:hover { fill: var(--brand-soft); }
  .chart text { fill: var(--muted); font-size: 10px; }

  /* Calendar */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
  .cal-head .m { font-weight: 600; color: var(--ink); }
  .cal-head button { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: .35rem .7rem; cursor: pointer; font-size: 1rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: .72rem; color: var(--muted); padding: .2rem 0; }
  .cal-cell { aspect-ratio: 1 / 1; border-radius: 7px; background: #f0f2f7; padding: .25rem; position: relative; overflow: hidden; }
  .cal-cell.empty { background: transparent; }
  .cal-cell .d { font-size: .72rem; color: var(--muted); }
  .cal-cell .amt { font-size: .66rem; font-weight: 700; color: var(--ink); position: absolute; left: .25rem; right: .25rem; bottom: .2rem; }
  .cal-cell.today { outline: 2px solid var(--gold); }
  .cal-cell[data-day] { cursor: pointer; }
  .cal-cell[data-day]:active { outline: 2px solid var(--indigo-soft); }
  .cal-spacer { width: 5rem; }

  /* Shifts list */
  .shift { border: 1px solid var(--line); border-radius: 10px; padding: .75rem .85rem; margin-bottom: .6rem; }
  .shift .top { display: flex; justify-content: space-between; align-items: baseline; gap: .5rem; }
  .shift .when { font-weight: 600; }
  .shift .by { color: var(--muted); font-size: .82rem; }
  .shift .tot { font-weight: 700; color: var(--ink); }
  .tl-axis, .tl-row { display: grid; grid-template-columns: 4.8rem 1fr 4.6rem; align-items: center; gap: .4rem; }
  .tl-axis { margin-top: .6rem; }
  .tl-ticks { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); }
  .tl-row { padding: .18rem 0; }
  .tl-name { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-tr { font-size: .65rem; color: var(--muted); margin-left: .2rem; }
  .tl-track { position: relative; height: 1.15rem; background: #eef0f5; border-radius: 5px; overflow: hidden; }
  .tl-bar { position: absolute; top: 0; bottom: 0; background: var(--indigo-soft); border-radius: 5px; }
  .tl-bar.trainee { background: var(--gold); }
  .tl-amt { text-align: right; font-size: .85rem; font-variant-numeric: tabular-nums; }
  .tl-fixed { margin-top: .55rem; padding-top: .45rem; border-top: 1px dashed var(--line); font-size: .82rem; color: var(--muted); }
  .dl-axis { margin: .2rem 0 .55rem; }
  .dl-rows { display: flex; flex-direction: column; gap: .45rem; }
  .dl-row .tl-track { height: 1.7rem; }
  .dl-bar { position: absolute; top: 0; bottom: 0; background: var(--brand); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
  .dl-amt { color: #fff; font-size: .8rem; font-weight: 700; white-space: nowrap; padding: 0 .3rem; }

  /* Single-day combined shift bar (Lunch | Dinner) */
  .day-combined { display: flex; width: 100%; height: 2.4rem; border-radius: 8px; overflow: hidden; gap: 2px; }
  .day-seg { display: flex; align-items: center; justify-content: center; min-width: 0; font-size: .82rem; font-weight: 700; white-space: nowrap; overflow: hidden; padding: 0 .4rem; cursor: pointer; }
  .day-seg.lunch { background: var(--gold); color: var(--ink); }
  .day-seg.dinner { background: var(--brand); color: #fff; }
  .day-seg-lbl { overflow: hidden; text-overflow: ellipsis; }

  /* Multi-day summary: one segmented bar per day */
  .mday-list { display: flex; flex-direction: column; gap: .35rem; }
  .mday { display: grid; grid-template-columns: 3rem 1fr 4.6rem; align-items: center; gap: .5rem; }
  .mday-label { font-size: .8rem; color: var(--muted); white-space: nowrap; }
  .mday-track { height: 1.5rem; background: #eef0f5; border-radius: 5px; overflow: hidden; display: flex; }
  .mday-amt { text-align: right; font-size: .85rem; font-variant-numeric: tabular-nums; color: var(--ink); }

  /* People table */
  .lb-row { padding: .6rem 0; border-bottom: 1px solid var(--line); }
  .lb-row:last-child { border-bottom: 0; }
  .lb-head { display: flex; justify-content: space-between; align-items: baseline; gap: .5rem; }
  .lb-name { font-weight: 600; }
  .lb-tag { color: var(--muted); font-weight: 400; font-size: .8rem; }
  .lb-earned { font-weight: 700; color: var(--indigo); font-variant-numeric: tabular-nums; }
  .lb-track { height: .6rem; background: #eef0f5; border-radius: 4px; overflow: hidden; margin: .35rem 0 .3rem; }
  .lb-bar { height: 100%; background: var(--gold); border-radius: 4px; }
  .lb-meta { font-size: .8rem; color: var(--muted); }
  .tip-pop { position: fixed; z-index: 50; background: var(--indigo); color: #fff; padding: .4rem .65rem; border-radius: 8px; font-size: .82rem; box-shadow: 0 6px 18px rgba(0,0,0,0.28); pointer-events: none; white-space: nowrap; }
  .dl-bar { cursor: pointer; }
  .modal { position: fixed; inset: 0; background: rgba(42,35,32,0.5); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 40; }
  .modal.hidden { display: none; }
  .modal-card { background: #fff; border-radius: 12px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 1rem; position: relative; }
  .modal-close { position: absolute; top: .3rem; right: .5rem; border: 0; background: transparent; font-size: 1.6rem; line-height: 1; cursor: pointer; color: var(--muted); }
  .badge { display: none; background: #b00; color: #fff; border-radius: 999px; padding: 0 .35rem; font-size: .7rem; margin-left: .25rem; font-weight: 700; }
  .badge.show { display: inline-block; }
  .req-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: .85rem; margin-bottom: .8rem; }
  .req-head { display: flex; justify-content: space-between; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .req-when { font-size: .85rem; color: var(--muted); }
  .req-actions { display: flex; gap: .4rem; }
  .req-note { background: #fff8e6; border: 1px solid #f0d77c; border-radius: 6px; padding: .5rem .6rem; margin: .55rem 0; font-size: .88rem; color: #604c00; white-space: pre-wrap; }
  .req-load-err { background: #fff0f0; border: 1px solid #f0b7b7; border-radius: 6px; padding: .5rem .6rem; margin-bottom: .8rem; font-size: .85rem; color: #8b1a1a; }
  .req-diff { display: flex; flex-direction: column; gap: .8rem; margin-top: .55rem; }
  .diff-col { min-width: 0; }
  @media (min-width: 560px) { .req-diff { flex-direction: row; } .diff-col { flex: 1; } }
  .diff-col .diff-label { font-size: .78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .25rem; }
  .btn-approve { background: var(--indigo); color: #fff; border: 0; padding: .45rem .85rem; border-radius: 999px; font-size: .85rem; font-weight: 600; cursor: pointer; }
  .btn-deny { background: #fff; color: #b00; border: 1px solid #b00; padding: .45rem .85rem; border-radius: 999px; font-size: .85rem; font-weight: 600; cursor: pointer; }
  .btn-approve:disabled, .btn-deny:disabled { opacity: .5; cursor: default; }

  .staff-panel { margin-bottom: .8rem; }
  .staff-add { display: flex; gap: .5rem; margin: .25rem 0 .8rem; }
  .staff-add input { flex: 1; min-width: 0; padding: .55rem .7rem; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem; }
  .staff-add button { background: var(--indigo); color: #fff; border: 0; padding: .55rem 1rem; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; }
  .staff-list { display: flex; flex-direction: column; gap: .8rem; }
  .staff-group { display: flex; flex-direction: column; gap: .4rem; }
  .staff-group-h { font-size: .74rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0; }
  .staff-row { display: flex; align-items: center; justify-content: space-between; gap: .5rem; padding: .45rem .55rem; background: #fafafa; border: 1px solid var(--line); border-radius: 8px; }
  .staff-row.inactive { background: #f3f3f3; color: var(--muted); }
  .staff-name { font-size: .95rem; word-break: break-word; }
  .staff-btn { background: #fff; color: var(--ink); border: 1px solid var(--line); padding: .5rem .9rem; border-radius: 999px; font-size: .8rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .staff-row.inactive .staff-btn { color: var(--indigo); border-color: var(--indigo); }
  .staff-empty { color: var(--muted); font-size: .9rem; padding: .35rem .1rem; }
  /* Server row with trainee control */
  .staff-row.staff-server { flex-direction: column; align-items: stretch; }
  .staff-server-top { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
  .staff-trainee { display: flex; align-items: center; gap: .5rem; }
  .staff-trainee-lbl { font-size: .85rem; color: var(--muted); }
  .trainee-pcts { display: flex; gap: .3rem; margin-left: auto; }
  .trainee-pcts.hidden { display: none; }
  .trainee-pct { padding: .4rem .6rem; font-size: .78rem; border: 1px solid var(--line); background: #fff; border-radius: 6px; cursor: pointer; color: var(--ink); }
  .trainee-pct.selected { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .set-switch.sm { width: 2.4rem; height: 1.4rem; }
  .set-switch.sm .set-slider::before { height: 1.1rem; width: 1.1rem; }
  .set-switch.sm input:checked + .set-slider::before { transform: translateX(1rem); }
  .staff-inactive { margin-top: .8rem; }
  .staff-inactive summary { cursor: pointer; color: var(--muted); font-size: .85rem; padding: .25rem 0; }
  .staff-inactive > .staff-row { margin-top: .4rem; }

  .empty-state { text-align: center; color: var(--muted); padding: 2rem 1rem; }
  .loading { text-align: center; color: var(--muted); padding: 2rem; }

  /* Settings */
  .set-row { padding: .4rem 0 1rem; border-bottom: 1px solid var(--line); margin-bottom: 1rem; }
  .set-row:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
  .set-label { font-weight: 600; font-size: .95rem; }
  .set-hint { color: var(--muted); font-size: .82rem; margin: .15rem 0 .6rem; }
  .set-langs { display: inline-flex; gap: 2px; background: #e9ecf3; border-radius: 10px; padding: .25rem; }
  .set-langs button { border: 0; background: transparent; color: var(--muted); font-weight: 600; font-size: .9rem; padding: .45rem .9rem; border-radius: 8px; cursor: pointer; }
  .set-langs button.active { background: #fff; color: var(--indigo); box-shadow: 0 1px 3px rgba(20,34,63,0.12); }
  .set-toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .set-switch { position: relative; width: 3rem; height: 1.75rem; flex: none; }
  .set-switch input { opacity: 0; width: 0; height: 0; }
  .set-slider { position: absolute; inset: 0; background: #ccc; border-radius: 1rem; transition: .2s; cursor: pointer; }
  .set-slider::before { content: ""; position: absolute; height: 1.5rem; width: 1.5rem; left: .125rem; bottom: .125rem; background: #fff; border-radius: 50%; transition: .2s; }
  .set-switch input:checked + .set-slider { background: var(--indigo); }
  .set-switch input:checked + .set-slider::before { transform: translateX(1.25rem); }
  .set-status { font-size: .82rem; color: var(--muted); margin-top: .5rem; min-height: 1em; }

  .slot-group { margin: .5rem 0; }
  .slot-group-h { font-weight: 600; font-size: .85rem; margin: .5rem 0 .3rem; }
  .slot-row { display: flex; flex-wrap: wrap; align-items: center; gap: .4rem; margin-bottom: .5rem; }
  .slot-row input[type=time] { flex: 1 1 5rem; min-width: 0; max-width: 9rem; padding: .35rem; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
  .slot-dash { color: var(--muted); }
  .slot-preview { flex: 1 1 100%; color: var(--muted); font-size: .82rem; }
  .slot-remove { border: 0; background: transparent; color: #b00; font-size: 1.15rem; line-height: 1; cursor: pointer; padding: 0 .35rem; }
  .slot-remove:disabled { opacity: .35; cursor: default; }
  .slot-add { border: 1px dashed #999; background: #fff; padding: .35rem .6rem; border-radius: 6px; cursor: pointer; font-size: .82rem; }
  #set-kitchen-pct { padding: .35rem; border: 1px solid #ccc; border-radius: 6px; font: inherit; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <img src="icons/icon.svg" alt="">
    <h1 data-i18n="gate_title">Matsuri Tips Admin</h1>
    <p id="gate-checking" class="gate-checking hidden" data-i18n="gate_checking">Checking saved PIN...</p>
    <div id="gate-form" class="hidden">
      <p data-i18n="gate_prompt">Enter your access PIN.</p>
      <input id="pin-input" type="password" inputmode="numeric" autocomplete="off"
             maxlength="10" placeholder="------" data-i18n-aria="pin_aria" aria-label="Access PIN">
      <button id="pin-submit" type="button" data-i18n="unlock">Unlock</button>
      <div class="gate-err" id="gate-err"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header class="bar">
    <div class="wrap">
      <img src="icons/icon.svg" alt="">
      <h1 data-i18n="admin_title">Tips Admin</h1>
      <a class="iconbtn" id="sheet-btn" href="https://docs.google.com/spreadsheets/d/1NbKaxie29WhzLnxkhVFKAA50EowPRLTsbahsYw3PPZI/edit" target="_blank" rel="noopener" data-i18n="sheet">Sheet</a>
      <button class="iconbtn" id="refresh-btn" type="button" data-i18n="refresh">Refresh</button>
      <button class="iconbtn" id="signout-btn" type="button" data-i18n="sign_out">Sign out</button>
    </div>
  </header>

  <div class="wrap">
    <div class="periods" id="periods">
      <button data-period="today" class="active" data-i18n="period_today">Today</button>
      <button data-period="yesterday" data-i18n="period_yesterday">Yesterday</button>
      <button data-period="last3" data-i18n="period_last3">Last 3 days</button>
      <button data-period="week" data-i18n="period_week">This Week</button>
      <button data-period="month" data-i18n="period_month">This Month</button>
      <button data-period="custom" data-i18n="period_custom">Custom</button>
    </div>
    <div class="custom-range" id="custom-range">
      <div class="day-presets" id="day-presets"></div>
      <div class="date-row">
        <input type="date" id="custom-start" data-i18n-aria="start_date" aria-label="Start date">
        <span data-i18n="range_to">to</span>
        <input type="date" id="custom-end" data-i18n-aria="end_date" aria-label="End date">
      </div>
    </div>
    <p class="range-label" id="range-label"></p>

    <div class="tabs" id="tabs">
      <button data-tab="summary" class="active" data-i18n="tab_summary">Summary</button>
      <button data-tab="calendar" data-i18n="tab_calendar">Calendar</button>

<script>
if ("serviceWorker" in navigator) {
  // Auto-refresh the dashboard when a new version takes over (read-only, so safe to reload).
  if (navigator.serviceWorker.controller) {
    let refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  }
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>

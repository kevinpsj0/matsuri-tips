<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>calc.js tests</title>
<style>
  body { font: 14px/1.4 -apple-system, system-ui, sans-serif; padding: 1rem; max-width: 720px; }
  .pass { color: #060; }
  .fail { color: #b00; font-weight: bold; }
  pre { background: #f4f4f4; padding: .5rem; overflow-x: auto; }
  h2 { margin: 1.5rem 0 .5rem; }
</style>
</head>
<body>
<h1>calc.js tests</h1>
<div id="results"></div>
<script src="calc.js"></script>
<script>
const results = document.getElementById("results");
let passed = 0, failed = 0;
function ok(cond, label, detail) {
  const d = document.createElement("div");
  d.className = cond ? "pass" : "fail";
  d.innerHTML = (cond ? "PASS" : "FAIL") + " — " + label + (cond ? "" : `<pre>${detail || ""}</pre>`);
  results.appendChild(d); cond ? passed++ : failed++;
}
const srv = (name, slot, o = {}) => ({ name, slot, trainee: !!o.trainee, pct: o.trainee ? o.pct : null });
const sum = (out) => out.kitchen + out.chefs.reduce((s,c)=>s+c.amount,0) + out.servers.reduce((s,p)=>s+p.amount,0);

(function () {
  let o = splitShift({ shiftType:"lunch", totalTips:400, servers:[srv("Alice","L1100"),srv("Bob","L1200")], chefs:[{name:"Cho"},{name:"Dan"}] });
  ok(o.kitchen===60 && o.chefs[0].amount===85 && o.chefs[1].amount===85 && o.servers[0].amount===93.5 && o.servers[1].amount===76.5, "lunch $400 2 servers + 2 chefs", JSON.stringify(o));

  o = splitShift({ shiftType:"dinner", totalTips:300, servers:[srv("Eve","D1630"),srv("Fay","D1800")], chefs:[{name:"Cho"}] });
  ok(o.kitchen===45 && o.chefs[0].amount===85 && o.servers[0].amount===100 && o.servers[1].amount===70, "dinner $300 2 servers + 1 chef", JSON.stringify(o));

  o = splitShift({ shiftType:"lunch", totalTips:200, servers:[srv("A","L1100"),srv("B","L1100")], chefs:[] });
  ok(o.chefs.length===0 && Math.round(sum(o)*100)===20000, "no chefs -> servers take all 85%", JSON.stringify(o));

  const cases = [
    { shiftType:"lunch", totalTips:1, servers:[srv("A","L1100")], chefs:[] },
    { shiftType:"dinner", totalTips:7.77, servers:[srv("A","D1530"),srv("B","D1800")], chefs:[{name:"C"}] },
    { shiftType:"lunch", totalTips:12345.67, servers:[srv("A","L1100"),srv("B","L1200")], chefs:[{name:"C"},{name:"D"},{name:"E"}] },
  ];
  cases.forEach(c => ok(Math.round(sum(splitShift(c))*100)===Math.round(c.totalTips*100), `sum invariant $${c.totalTips}`));
})();

window.addEventListener("load", () => {
  const s = document.createElement("h2");
  s.textContent = `${passed} passed, ${failed} failed`;
  s.style.color = failed ? "#b00" : "#060";
  results.appendChild(s);
});
</script>
</body>
</html>

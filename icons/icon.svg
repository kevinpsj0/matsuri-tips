<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26406F"/>
      <stop offset="1" stop-color="#0E1A33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4D389"/>
      <stop offset="1" stop-color="#D6A04C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#F4D389" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F4D389" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="214" r="150" fill="url(#glow)"/>

  <g fill="url(#gold)">
    <!-- shimaki: thin top cap -->
    <rect x="104" y="138" width="304" height="16" rx="8"/>
    <!-- kasagi: main top beam -->
    <rect x="120" y="156" width="272" height="30" rx="6"/>
    <!-- gakuzuka: center tablet -->
    <rect x="244" y="186" width="24" height="40"/>
    <!-- nuki: lower beam -->
    <rect x="146" y="224" width="220" height="28" rx="4"/>
    <!-- left pillar (tapered, slight inward lean) -->
    <polygon points="176,186 198,186 202,388 162,388"/>
    <!-- right pillar (mirror) -->
    <polygon points="314,186 336,186 350,388 310,388"/>
  </g>
</svg>

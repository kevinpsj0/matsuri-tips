<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Today's Shifts</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14223F">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Matsuri Tips">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f7f7f7; color: #222; padding: 1rem; max-width: 480px; margin: 0 auto;
  }
  header.head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .8rem; }
  header.head h1 { font-size: 1.2rem; margin: 0; }
  .back { color: #3b82f6; text-decoration: none; font-size: .9rem; }
  .refresh {
    background: #fff; border: 1px solid #ccc; border-radius: 6px;
    padding: .4rem .8rem; font-size: .85rem; cursor: pointer; margin-bottom: .8rem;
  }
  .shift { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: .85rem; margin-bottom: .6rem; }
  .shift-head { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
  .when { font-weight: 700; }
  .tot { color: #14223F; }
  .by { color: #6b7280; font-size: .82rem; margin-top: .2rem; }
  .lines { margin-top: .55rem; border-top: 1px dashed #ddd; padding-top: .55rem; }
  .ln { display: flex; justify-content: space-between; padding: .15rem 0; font-size: .92rem; gap: .5rem; }
  .ln .val { font-variant-numeric: tabular-nums; }
  .req-btn {
    border: 1px solid #ccc; background: #fff; border-radius: 999px;
    padding: .3rem .75rem; font-size: .78rem; cursor: pointer; color: #444;
  }
  .empty, .loading { text-align: center; color: #6b7280; padding: 2rem 1rem; }
  .toast {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: #14223F; color: #fff; padding: .6rem 1rem; border-radius: 8px;
    font-size: .85rem; z-index: 60; box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }
  .toast.hidden { display: none; }
  .modal { position: fixed; inset: 0; background: rgba(20,34,63,0.5); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50; }
  .modal.hidden { display: none; }
  .modal-card { background: #fff; border-radius: 12px; max-width: 420px; width: 100%; padding: 1rem; max-height: 90vh; overflow-y: auto; }
  .modal-card h2 { font-size: 1.05rem; margin: 0 0 .3rem; }
  .modal-card .sub { color: #6b7280; font-size: .82rem; margin-bottom: .6rem; }
  .modal-card label { display: block; font-weight: 600; font-size: .85rem; margin: .6rem 0 .2rem; }
  .modal-card input[type=text], .modal-card input[type=number], .modal-card textarea, .modal-card select {
    width: 100%; padding: .55rem; border: 1px solid #ccc; border-radius: 6px;
    font: inherit; font-size: .95rem; background: #fff;
  }
  .modal-card input[type=checkbox] { width: auto; margin: 0; flex: none; }
  .modal-card textarea { resize: vertical; min-height: 4.5rem; }
  .err { color: #b00; font-size: .82rem; margin-top: .4rem; min-height: 1em; }
  .modal-actions { display: flex; gap: .5rem; margin-top: .8rem; }
  .modal-actions button { flex: 1; padding: .65rem; font-size: .95rem; border-radius: 8px; border: 0; cursor: pointer; }
  .btn-primary { background: #3b82f6; color: #fff; font-weight: 600; }
  .btn-secondary { background: #eee; color: #222; }
  hr.sep { border: 0; border-top: 1px solid #eee; margin: .8rem 0; }
  .hint { color: #6b7280; font-size: .82rem; margin: 0 0 .5rem; }
  .edit-person { border: 1px solid #ddd; border-radius: 8px; padding: .55rem; margin-bottom: .5rem; }
  .ep-row { display: flex; gap: .4rem; align-items: center; margin-bottom: .3rem; }
  .ep-row > input, .ep-row > select { flex: 1; min-width: 0; }
  .ep-remove { border: 0; background: transparent; color: #b00; font-size: 1.1rem; cursor: pointer; padding: 0 .4rem; line-height: 1; }
  .ep-trainee-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; font-size: .85rem; }
  .modal-card .ep-trainee-row label { display: inline-flex; align-items: center; gap: .4rem; margin: 0; }
  .modal-card .chef-check { display: flex; align-items: center; gap: .5rem; font-weight: 400; font-size: .95rem; margin: 0; padding: .35rem 0; cursor: pointer; }
  .ep-pct { display: flex; gap: .3rem; }
  .ep-pct.hidden { display: none; }
  .ep-pct button { padding: .3rem .55rem; font-size: .78rem; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; }
  .ep-pct button.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .add-btn { border: 1px dashed #999; background: #fff; padding: .55rem; width: 100%; border-radius: 8px; cursor: pointer; margin-top: .25rem; }
</style>
</head>
<body>

<header class="head">
  <h1>Today's shifts</h1>
  <a class="back" href="./">&larr; Back to entry</a>
</header>

<button type="button" class="refresh" id="refresh-btn">Refresh</button>

<div id="content"><div class="loading">Loading...</div></div>

<div class="modal hidden" id="edit-modal">
  <div class="modal-card">
    <h2>Request edit</h2>
    <div class="sub" id="edit-sub"></div>

    <label for="req-name">Your name</label>
    <input type="text" id="req-name" autocomplete="off" maxlength="60">

    <label for="req-note">Note (optional)</label>
    <textarea id="req-note" maxlength="500" placeholder="Anything the owner should know"></textarea>

    <hr class="sep">
    <p class="hint">Edit any field below, then send. The owner will review and approve.</p>

    <label for="edit-by">Entered by</label>
    <input type="text" id="edit-by" maxlength="60" autocomplete="off">

    <label for="edit-total">Total tip amount ($)</label>
    <input type="number" id="edit-total" inputmode="decimal" step="0.01" min="1" max="100000">

    <label>Shift</label>
    <div class="ep-pct" id="edit-shift">
      <button type="button" data-shift="lunch">Lunch</button>
      <button type="button" data-shift="dinner">Dinner</button>
    </div>

    <label>Servers</label>
    <div id="edit-people"></div>
    <button type="button" class="add-btn" id="edit-add">+ Add server</button>

    <div id="edit-chef-section" class="hidden">
      <label>Chefs on shift</label>
      <div id="edit-chef-list"></div>
    </div>

    <div class="err" id="req-err"></div>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="req-cancel">Cancel</button>
      <button type="button" class="btn-primary" id="req-send">Send request</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="calc.js"></script>
<script>
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbyvxUBapgpbZpf-ndoexuH2ZjWIwO5bIzH26F-OeWmEcQY4QqbeFXs2lvRTarhlaFtHtQ/exec";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmt(n) { return "$" + (n || 0).toFixed(2); }
const ME_KEY = "matsuri_me";
function getMe() { try { return localStorage.getItem(ME_KEY) || ""; } catch (e) { return ""; } }
function setMe(name) { try { name ? localStorage.setItem(ME_KEY, name) : localStorage.removeItem(ME_KEY); } catch (e) {} }

const content = document.getElementById("content");
const refreshBtn = document.getElementById("refresh-btn");
const modal = document.getElementById("edit-modal");
const editSub = document.getElementById("edit-sub");
const reqName = document.getElementById("req-name");
const reqNote = document.getElementById("req-note");
const reqErr = document.getElementById("req-err");
const reqSend = document.getElementById("req-send");
const editBy = document.getElementById("edit-by");
const editTotal = document.getElementById("edit-total");
const editPeople = document.getElementById("edit-people");
const editAdd = document.getElementById("edit-add");
const toastEl = document.getElementById("toast");

let shiftsMap = {};
let currentSid = null;
let editShift = "dinner";
let editChefRoster = []; // [{name}] role=Chef from the roster

async function loadChefRoster() {
  try {
    const res = await fetch(ENDPOINT_URL, { method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "fetchStaff" }) });
    const data = await res.json();
    if (data && data.ok && Array.isArray(data.staff)) editChefRoster = data.staff.filter(s => (s.role || "Server") === "Chef").map(s => ({ name: s.name }));
  } catch (e) {}
}
loadChefRoster();

async function load() {
  content.innerHTML = `<div class="loading">Loading...</div>`;
  try {
    const res = await fetch(ENDPOINT_URL, {
      method: "POST", mode: "cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "fetchToday" }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || "load failed");
    render(data.rows || []);
  } catch (e) {
    content.innerHTML = `<div class="empty">Could not load. Check your connection and tap Refresh.</div>`;
  }
}

const roleOrder = { Server: 0, Trainee: 1, Chef: 2, Kitchen: 3 };

function render(rows) {
  if (!rows.length) { content.innerHTML = `<div class="empty">No shifts entered today yet.</div>`; shiftsMap = {}; return; }
  shiftsMap = {};
  for (const r of rows) {
    const id = r.submissionId || (r.date + r.time);
    if (!shiftsMap[id]) shiftsMap[id] = { id: id, date: r.date, time: r.time, enteredBy: r.enteredBy, totalTips: r.totalTips, recipients: [] };
    shiftsMap[id].recipients.push(r);
  }
  const list = Object.values(shiftsMap).sort((a, b) => (b.time || "").localeCompare(a.time || ""));
  content.innerHTML = list.map((sh) => {
    const recips = sh.recipients.slice().sort((a, b) => (roleOrder[a.role] || 0) - (roleOrder[b.role] || 0));
    const lines = recips.map((r) => {
      let label = r.role === "Kitchen" ? "Kitchen" : escapeHtml(r.recipient || "?");
      if (r.role === "Chef") label += " (chef)";
      if (r.role === "Trainee" && r.traineePct != null) label += ` (${escapeHtml(String(r.traineePct))}% trainee)`;
      const tm = r.slot ? ` · ${escapeHtml(r.slot)}` : "";
      return `<div class="ln"><span>${label}${tm}</span><span class="val">${fmt(r.amount)}</span></div>`;
    }).join("");
    const shiftTag = sh.recipients[0] && sh.recipients[0].shift ? escapeHtml(sh.recipients[0].shift) + " · " : "";
    return `<div class="shift" data-sid="${escapeHtml(sh.id)}">
      <div class="shift-head">
        <span class="when">${shiftTag}${escapeHtml(sh.time)} · <span class="tot">${fmt(sh.totalTips)}</span></span>
        <button type="button" class="req-btn">Request edit</button>
      </div>
      <div class="by">Entered by ${escapeHtml(sh.enteredBy || "?")}</div>
      <div class="lines">${lines}</div>
    </div>`;
  }).join("");
}

// ---- edit modal ----

function slotOptions(shift, selectedId) {
  return '<option value="">Pick a time</option>' + (SHIFT_SLOTS[shift] || []).map(s => `<option value="${s.id}"${s.id === selectedId ? " selected" : ""}>${escapeHtml(s.label)}</option>`).join("");
}

function personRowHtml(p) {
  const trainee = !!p.trainee;
  const pct = (trainee && (p.pct === 25 || p.pct === 50 || p.pct === 75)) ? p.pct : 50;
  const btn = (v) => `<button type="button" data-pct="${v}"${pct === v ? ' class="selected"' : ""}>${v}%</button>`;
  return `<div class="edit-person">
    <div class="ep-row">
      <input type="text" class="ep-name" maxlength="40" placeholder="Name" value="${escapeHtml(p.name || "")}">
      <button type="button" class="ep-remove" aria-label="Remove">&times;</button>
    </div>
    <div class="ep-row"><select class="ep-slot">${slotOptions(editShift, p.slot || "")}</select></div>
    <div class="ep-trainee-row">
      <label><input type="checkbox" class="ep-trainee"${trainee ? " checked" : ""}> Trainee</label>
      <div class="ep-pct${trainee ? "" : " hidden"}">${btn(25)}${btn(50)}${btn(75)}</div>
    </div>
  </div>`;
}

function renderEditPeople(people) {
  editPeople.innerHTML = people.map(personRowHtml).join("");
}

function readEditServers() {
  return Array.from(editPeople.querySelectorAll(".edit-person")).map((row) => {
    const trainee = row.querySelector(".ep-trainee").checked;
    const sel = row.querySelector(".ep-pct button.selected");
    return {
      name: row.querySelector(".ep-name").value.trim(),
      slot: row.querySelector(".ep-slot").value,
      trainee: trainee,
      pct: trainee ? (sel ? parseInt(sel.dataset.pct, 10) : 50) : null,
    };
  });
}

function renderEditChefs(checkedNames) {
  const sec = document.getElementById("edit-chef-section");
  const list = document.getElementById("edit-chef-list");
  const checked = checkedNames || [];
  // Union the roster with chefs already on the shift, so a slow/failed roster
  // load can never silently drop existing chefs (which would redistribute their
  // money to servers on save).
  const names = [], seen = {};
  editChefRoster.map(c => c.name).concat(checked).forEach(n => {
    const k = String(n).toLowerCase();
    if (k && !seen[k]) { seen[k] = true; names.push(n); }
  });
  if (!names.length) { sec.classList.add("hidden"); list.innerHTML = ""; return; }
  sec.classList.remove("hidden");
  const set = new Set(checked.map(n => n.toLowerCase()));
  list.innerHTML = names.map(n => `<label class="chef-check"><input type="checkbox" class="edit-chef-cb" value="${escapeHtml(n)}"${set.has(n.toLowerCase()) ? " checked" : ""}> ${escapeHtml(n)}</label>`).join("");
}

function readEditChefs() {
  return Array.from(document.querySelectorAll(".edit-chef-cb")).filter(cb => cb.checked).map(cb => ({ name: cb.value }));
}

function renderEditShiftToggle() {
  document.querySelectorAll("#edit-shift button").forEach(b => b.classList.toggle("selected", b.dataset.shift === editShift));
}

// Delegated handlers on the people container
editPeople.addEventListener("click", (e) => {
  const remove = e.target.closest(".ep-remove");
  if (remove) {
    const rows = editPeople.querySelectorAll(".edit-person");
    if (rows.length <= 1) return; // keep at least one
    remove.closest(".edit-person").remove();
    return;
  }
  const pctBtn = e.target.closest(".ep-pct button[data-pct]");
  if (pctBtn) {
    const group = pctBtn.parentElement;
    group.querySelectorAll("button").forEach((b) => b.classList.toggle("selected", b === pctBtn));
    return;
  }
});
editPeople.addEventListener("change", (e) => {
  const toggle = e.target.closest(".ep-trainee");
  if (!toggle) return;
  const row = toggle.closest(".edit-person");
  const pct = row.querySelector(".ep-pct");
  pct.classList.toggle("hidden", !toggle.checked);
  if (toggle.checked && !pct.querySelector("button.selected")) {
    pct.querySelectorAll("button").forEach((b) => b.classList.toggle("selected", b.dataset.pct === "50"));
  }
});

editAdd.addEventListener("click", () => {
  const rows = editPeople.querySelectorAll(".edit-person");
  if (rows.length >= 12) return;
  editPeople.insertAdjacentHTML("beforeend", personRowHtml({ name: "", slot: "", trainee: false }));
});

document.getElementById("edit-shift").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-shift]"); if (!b) return;
  editShift = b.dataset.shift; renderEditShiftToggle();
  editPeople.querySelectorAll(".ep-slot").forEach(sel => { sel.innerHTML = slotOptions(editShift, getSlot(editShift, sel.value) ? sel.value : ""); });
});

content.addEventListener("click", (e) => {
  const btn = e.target.closest(".req-btn");
  if (!btn) return;
  const card = btn.closest(".shift");
  const sid = card.dataset.sid;
  const sh = shiftsMap[sid];
  if (!sh) {
    alert("That shift is no longer on today's list. Tap Refresh to reload.");
    return;
  }
  currentSid = sid;
  editSub.textContent = `Shift ${sh.date} ${sh.time} · ${fmt(sh.totalTips)}. The owner will review.`;
  reqName.value = getMe();
  reqNote.value = "";
  reqErr.textContent = "";
  editBy.value = sh.enteredBy || "";
  editTotal.value = (sh.totalTips != null) ? sh.totalTips : "";
  const recs = sh.recipients;
  editShift = (recs[0] && recs[0].shift ? recs[0].shift : "Dinner").toLowerCase() === "lunch" ? "lunch" : "dinner";
  renderEditShiftToggle();
  const servers = recs.filter((r) => r.role === "Server" || r.role === "Trainee").map((r) => {
    const slot = findSlotByTimes(editShift, r.timeIn, r.timeOut);
    return { name: r.recipient || "", slot: slot ? slot.id : "", trainee: r.role === "Trainee", pct: r.traineePct };
  });
  renderEditPeople(servers.length ? servers : [{ name: "", slot: "", trainee: false }]);
  const checkedChefs = recs.filter((r) => r.role === "Chef").map((r) => r.recipient || "");
  renderEditChefs(checkedChefs);
  modal.classList.remove("hidden");
  reqName.focus();
});

document.getElementById("req-cancel").addEventListener("click", () => modal.classList.add("hidden"));
modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.add("hidden"); });


function buildProposed() {
  const enteredBy = editBy.value.trim();
  const totalTips = parseFloat(editTotal.value);
  const servers = readEditServers();
  const chefs = readEditChefs();
  if (!enteredBy) return { error: "Please enter who recorded the shift." };
  if (!isFinite(totalTips) || totalTips < 1 || totalTips > 100000) return { error: "Total must be between $1 and $100,000." };
  if (!servers.length) return { error: "At least one server is required." };
  for (let i = 0; i < servers.length; i++) {
    if (!servers[i].name) return { error: `Server ${i + 1}: name is required.` };
    if (!getSlot(editShift, servers[i].slot)) return { error: `Server ${i + 1}: pick a time slot.` };
  }
  const names = chefs.map(c => c.name.toLowerCase());
  if (new Set(names).size !== names.length) return { error: "Duplicate chef selected." };
  return { proposed: { shiftType: editShift, enteredBy, totalTips, servers, chefs } };
}

reqSend.addEventListener("click", async () => {
  const name = reqName.value.trim();
  const note = reqNote.value.trim();
  if (!name) { reqErr.textContent = "Please enter your name."; reqName.focus(); return; }
  const built = buildProposed();
  if (built.error) { reqErr.textContent = built.error; return; }
  reqErr.textContent = "";
  reqSend.disabled = true; reqSend.textContent = "Sending...";
  try {
    const res = await fetch(ENDPOINT_URL, {
      method: "POST", mode: "cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "requestEdit", submissionId: currentSid, requestedBy: name, note: note, proposed: built.proposed }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "send failed");
    setMe(name);
    modal.classList.add("hidden");
    showToast("Edit request sent to the owner.");
  } catch (err) {
    reqErr.textContent = "Could not send: " + (err && err.message || "try again.");
  } finally {
    reqSend.disabled = false; reqSend.textContent = "Send request";
  }
});

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.remove("hidden");
  setTimeout(() => toastEl.classList.add("hidden"), 3500);
}

refreshBtn.addEventListener("click", load);
load();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>

</body>
</html>
